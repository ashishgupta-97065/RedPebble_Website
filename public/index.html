<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" sizes="64x64" href="/favicon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:fixed; inset:0; background:#000; overflow:hidden;">
  <template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#0a0a0a"/><ellipse cx="50" cy="58" rx="27" ry="13" fill="#7c0a00"/><ellipse cx="50" cy="50" rx="22" ry="12" fill="#e40f00"/><ellipse cx="44" cy="45" rx="8" ry="4" fill="#ff7a6e" opacity="0.8"/><text x="50" y="84" font-family="sans-serif" font-size="11" fill="#f6f7f8" text-anchor="middle" font-weight="700">RedPebble</text></svg></template>
  <sc-if value="{{ mobile }}" hint-placeholder-val="{{ true }}">
    <dc-import name="RedPebble Mobile" style="position:absolute; inset:0;" hint-size="100%,100%"></dc-import>
  </sc-if>
  <sc-if value="{{ desktop }}" hint-placeholder-val="{{ false }}">
    <dc-import name="RedPebble Desktop" style="position:absolute; inset:0;" hint-size="100%,100%"></dc-import>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  // Router: mounts the mobile or desktop view based on the device.
  // All shared behaviour (contact / send-mail) lives in redpebble-shared.js,
  // imported by each view — so functionality is written once.
  constructor(props){
    super(props);
    this.state = { mobile: this.detect() };
  }
  detect(){
    // Manual test override: open with ?view=mobile or ?view=desktop to force a
    // platform on any screen size (handy in the preview, which has no device toggle).
    try {
      const v = new URLSearchParams(window.location.search).get('view');
      if (v === 'mobile') return true;
      if (v === 'desktop') return false;
    } catch (e) {}
    // The liquid mobile site is now the DEFAULT for ALL devices. Desktop users can
    // opt into the WebGL scene via the "Skip the Pebble" button (?view=desktop).
    return true;
  }
  componentDidMount(){
    this._onR = () => { const m = this.detect(); if (m !== this.state.mobile) this.setState({ mobile: m }); };
    window.addEventListener('resize', this._onR);
    window.addEventListener('orientationchange', this._onR);
  }
  componentWillUnmount(){
    window.removeEventListener('resize', this._onR);
    window.removeEventListener('orientationchange', this._onR);
  }
  renderVals(){
    return { mobile: this.state.mobile, desktop: !this.state.mobile };
  }
}
</script>
</body>
</html>
